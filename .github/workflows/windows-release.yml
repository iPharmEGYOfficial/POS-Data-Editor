name: Windows Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore .\ALNOUR.InvoiceManager.csproj

      - name: Publish Windows x64
        shell: pwsh
        run: .\publish-windows.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: POS_Data_Editor_win-x64
          path: release\POS_Data_Editor_v1.0.0_win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: POS Data Editor ${{ github.ref_name }}
          body: |
            POS Data Editor stable Windows release.
            Owner: Haitham Osama Abdelghaffar | iPharmEGY.
          files: release\POS_Data_Editor_v1.0.0_win-x64.zip
